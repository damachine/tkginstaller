name: Update SHA256SUMS

on:
  push:
    branches: [ master ]
    paths:
      - 'tkginstaller'
  release:
    types: [ published ]
  workflow_dispatch:  # Allows manual execution

permissions:
  contents: write

jobs:
  checksum:
    name: Generate and Update SHA256SUMS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SHA256SUMS
        id: checksum
        run: |
          echo "📝 Generating SHA256SUMS..."
          sha256sum tkginstaller > SHA256SUMS
          
          # Store checksum in output
          CHECKSUM=$(awk '{print $1}' SHA256SUMS)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          
          # Display result
          echo ""
          echo "✅ Generated SHA256SUMS:"
          cat SHA256SUMS
          echo ""

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code SHA256SUMS > /dev/null 2>&1 && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        env:
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        env:
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add SHA256SUMS
          git commit -m "Auto-update SHA256SUMS [skip ci]

          SHA256: $CHECKSUM
          Triggered by: $COMMIT_MESSAGE"

          git push

      - name: Create summary
        run: |
          echo "## ✅ SHA256SUMS Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat SHA256SUMS >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Checksum:** \`${{ steps.checksum.outputs.checksum }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
